<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI4 IMPACT | Hackathon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Design Tokens ─── */
    :root {
      --bg-dark: #050508;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.15);
      --text-main: #ffffff;
      --text-muted: #a1a1aa;
      --accent-glow: #8b5cf6;
      --font-display: "Orbitron", sans-serif;
      --font-body: "Rajdhani", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-body);
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }

    /* ─── Animated Background for Glassmorphism ─── */
    .bg-orbs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: var(--bg-dark);
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s infinite alternate ease-in-out;
    }
    .orb-1 { width: 40vw; height: 40vw; background: #4c1d95; top: -10%; left: -10%; }
    .orb-2 { width: 30vw; height: 30vw; background: #2563eb; bottom: 10%; right: -5%; animation-delay: -5s; }
    .orb-3 { width: 35vw; height: 35vw; background: #9333ea; top: 40%; left: 30%; opacity: 0.3; animation-delay: -10s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(10vw, 10vh) scale(1.2); }
    }

    /* ─── Reusable Glass Utility ─── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      padding: 2rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    
    .glass:hover {
      border-color: var(--glass-highlight);
      transform: translateY(-2px);
    }

    /* ─── Typography ─── */
    h1, h2, h3 {
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .section-title {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 2rem;
      background: linear-gradient(to right, #fff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ─── Layout Wrapper ─── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    section {
      padding: 6rem 0;
    }

    /* ─── Navbar ─── */
    nav {
      padding: 2rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
    }
    .nav-links span {
      width: 40px;
      height: 4px;
      background: var(--glass-highlight);
      border-radius: 2px;
    }

    /* ─── Hero Section ─── */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      min-height: 70vh;
    }
    .hero-title {
      font-size: clamp(3rem, 6vw, 5rem);
      line-height: 1;
      margin-bottom: 1.5rem;
    }
    .hero-lines {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .hero-line {
      height: 12px;
      background: var(--glass-border);
      border-radius: 6px;
      width: 80%;
    }
    .hero-line:nth-child(2) { width: 60%; }
    .hero-line:nth-child(3) { width: 40%; }
    
    .btn-register {
      display: inline-block;
      padding: 1rem 2.5rem;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      background: rgba(139, 92, 246, 0.2);
      border: 1px solid rgba(139, 92, 246, 0.5);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .btn-register:hover {
      background: rgba(139, 92, 246, 0.4);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
    }

    .hero-logo-box {
      aspect-ratio: 4/5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }
    .hero-logo-box img.main-logo {
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
    }
    .hazard-stripe {
      position: absolute;
      top: 0;
      right: 0;
      width: 150px;
      opacity: 0.7;
    }

    /* ─── About Section ─── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .about-card {
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-family: var(--font-display);
      color: rgba(255,255,255,0.7);
    }

    /* ─── Events Section ─── */
    .events-stack {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .event-card {
      min-height: 150px;
    }

    /* ─── Timeline Section ─── */
    .timeline-container {
      padding: 4rem 0;
      position: relative;
    }
    .timeline-line {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--glass-border);
      transform: translateY(-50%);
    }
    .timeline-nodes {
      display: flex;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }
    .node {
      width: 20px;
      height: 20px;
      background: var(--bg-dark);
      border: 2px solid var(--accent-glow);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    /* ─── Highlights Section ─── */
    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }
    .prize-pool {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      margin-bottom: 2rem;
    }
    .prize-pool h3 {
      font-size: 2rem;
      color: var(--text-muted);
    }
    .stat-card {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-family: var(--font-display);
    }

    /* ─── Sponsors & Footer ─── */
    .sponsors-box {
      min-height: 300px;
    }

    footer {
      text-align: center;
      padding: 4rem 0;
      border-top: 1px solid var(--glass-border);
      margin-top: 4rem;
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
    }

    /* ─── Responsive Design ─── */
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; text-align: center; }
      .hero-lines { align-items: center; }
      .hero-logo-box { max-width: 500px; margin: 0 auto; aspect-ratio: 1; }
      .about-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .highlights-grid { grid-template-columns: 1fr; }
      .stat-card { aspect-ratio: auto; min-height: 150px; }
      .timeline-nodes { flex-direction: column; gap: 4rem; align-items: center; }
      .timeline-line { width: 2px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">
    
    <nav>
      <div class="logo-text" style="font-family: var(--font-display); font-weight: 900; font-size: 1.5rem;">AI4</div>
      <div class="nav-links">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-content">
        <h1 class="hero-title">AI4<br>IMPACT</h1>
        <div class="hero-lines">
          <div class="hero-line"></div>
          <div class="hero-line"></div>
          <div class="hero-line"></div>
        </div>
        <a href="#" class="btn-register">Register</a>
      </div>
      
      <div class="glass hero-logo-box">
        <img src="/assets/hazard.svg" class="hazard-stripe" alt="">
        <img src="/public/logo-w.svg" class="main-logo" alt="AI4 Impact Logo">
      </div>
    </section>

    <section id="about">
      <h2 class="section-title">About</h2>
      <div class="about-grid">
        <div class="glass about-card">Gap</div>
        <div class="glass about-card">Approach</div>
      </div>
    </section>

    <section id="events">
      <h2 class="section-title">Events:</h2>
      <div class="events-stack">
        <div class="glass event-card"></div>
        <div class="glass event-card"></div>
      </div>
    </section>

    <section id="timeline">
      <h2 class="section-title">Timeline:</h2>
      <div class="glass timeline-container">
        <div class="timeline-line"></div>
        <div class="timeline-nodes">
          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>
        </div>
      </div>
    </section>

    <section id="highlights">
      <h2 class="section-title">Highlights</h2>
      <div class="glass prize-pool">
        <h3>Prize Pool Placeholder</h3>
      </div>
      <div class="highlights-grid">
        <div class="glass stat-card">Stats</div>
        <div class="glass stat-card">Stats</div>
        <div class="glass stat-card">Stats</div>
      </div>
    </section>

    <section id="sponsors">
      <h2 class="section-title">Sponsors!</h2>
      <div class="glass sponsors-box"></div>
    </section>

  </div>

  <footer>
    OC
  </footer>

</body>
</html>
